namespace: sorteos-live
images:
  - name: harbor.coopetarrazu.com:8443/sorteos-live
    newName: harbor.coopetarrazu.com:8443/cluster/prod/sorteos-live/sorteos-live
    newTag: v1.0.0
resources:
  - ../../base
patches:
  - target:
      kind: Ingress
      name: sorteos-live-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: sorteos-live.coopetarrazu.dev
      - op: replace
        path: /spec/rules/0/host
        value: sorteos-live.coopetarrazu.dev
